name: 'Pipeline de Integração Contínua - Entrega Final'

# 1. Definição de todos os Gatilhos (Triggers) solicitados
on:
  push:
    branches: [master, main] # Execução por push
  workflow_dispatch: # Execução manual 
  schedule:
    - cron: '0 8 * * *' # Execução agendada (ex: diariamente às 08h UTC) 

jobs:
  # Job de Inspeção de Código (Lint)
  inspecao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Instalando Yarn
        run: npm install -g yarn 
      - name: Instalando Dependências
        run: yarn # [12]
      - name: Verificação de Estilo (Lint)
        run: yarn run lint 

  # Job de Testes de Unidade
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao] 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install -g yarn
      - run: yarn
      - name: Executando Testes de Unidade
        run: yarn run test 

  # Job de Testes End-to-End (E2E) com Relatórios
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao] 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x # Ajustado para uma versão LTS válida do Node (24 ainda não é padrão estável) 
      - name: Instalando Yarn
        run: npm install -g yarn
      - name: Instalando Dependências
        run: yarn
      - name: Instalando Browsers do Playwright
        run: yarn playwright install 
      - name: Executando Testes E2E
        run: yarn run e2e 

      # 2. Geração e Armazenamento do Relatório na Pipeline
      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4 
        if: ${{ always() }} # Garante que o relatório seja salvo mesmo que os testes falhem
        with:
          name: relatorio-playwright
          path: ./playwright-report 

  # Job de Deploy Simulado (Fase final da Pipeline)
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests] 
    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado com sucesso após testes!' 
