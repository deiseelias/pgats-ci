name: "Pipeline de Integração Contínua - Entrega Final"

# 1. Definição de todos os Gatilhos (Triggers) solicitados
on:
  push:
    branches: [ master, main ]   # Execução por push [6, 7]
  workflow_dispatch:            # Execução manual (botão no GitHub) [8, 9]
  schedule:
    - cron: '0 8 * * *'         # Execução agendada (ex: diariamente às 08h UTC) [10, 11]

jobs:
  # Job de Inspeção de Código (Lint)
  inspecao:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # [8]
      - uses: actions/setup-node@v4
        with:
          node-version: latest
      - name: Instalando Yarn
        run: npm install -g yarn # [8]
      - name: Instalando Dependências
        run: yarn # [12]
      - name: Verificação de Estilo (Lint)
        run: yarn run lint  # Ou comando similar do seu projeto [13]

  # Job de Testes de Unidade
  unidade:
    runs-on: ubuntu-latest
    needs: [inspecao] # [6, 14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install -g yarn
      - run: yarn
      - name: Executando Testes de Unidade
        run: yarn run test # [15]

  # Job de Testes End-to-End (E2E) com Relatórios
  e2e-tests:
    runs-on: ubuntu-latest
    needs: [inspecao] # [6]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x # Ajustado para uma versão LTS válida do Node (24 ainda não é padrão estável) [16]
      - name: Instalando Yarn
        run: npm install -g yarn
      - name: Instalando Dependências
        run: yarn
      - name: Instalando Browsers do Playwright
        run: yarn playwright install # [12, 17]
      - name: Executando Testes E2E
        run: yarn run e2e # [12, 17]

      # 2. Geração e Armazenamento do Relatório na Pipeline
      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4 # [4, 18]
        if: ${{ always() }}  # Garante que o relatório seja salvo mesmo se os testes falharem [4]
        with:
          name: relatorio-playwright
          path: ./playwright-report  # Verifique o caminho da pasta de relatórios do seu projeto [4]

  # Job de Deploy Simulado (Fase final da Pipeline)
  deploy:
    runs-on: ubuntu-latest
    needs: [unidade, e2e-tests] # [6]
    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado com sucesso após testes!' # [19]